<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Web of Webs</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="login-body">

<div class="login-container">

<h1>Welcome Back 👋</h1>

<p>Login to continue to Web of Webs</p>

<input
type="email"
id="email"
placeholder="Enter your email"
>

<input
type="password"
id="password"
placeholder="Enter your password"
>

<button onclick="signup()">
Create Account
</button>

<button onclick="login()">
Login
</button>

<button onclick="googleLogin()" class="google-btn">
Continue with Google
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getAuth,

GoogleAuthProvider,

signInWithPopup,

createUserWithEmailAndPassword,

signInWithEmailAndPassword

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyBBg5ULPiuynvTnFtVJSYIq2THUJU1-ODo",

authDomain: "web-of-webs-5dcc6.firebaseapp.com",

projectId: "web-of-webs-5dcc6",

storageBucket: "web-of-webs-5dcc6.firebasestorage.app",

messagingSenderId: "716021090393",

appId: "1:716021090393:web:6ccf781be1d36d49408948",

measurementId: "G-WNJK1QDBV8"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();

window.googleLogin = async function(){

try{

const result = await signInWithPopup(
auth,
provider
);

localStorage.setItem(
"wowUser",
result.user.displayName
);

window.location.href = "dashboard.html";

}catch(error){

alert(error.message);

}

}

window.signup = async function(){

try{

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

await createUserWithEmailAndPassword(
auth,
email,
password
);

localStorage.setItem(
"wowUser",
email
);

window.location.href = "dashboard.html";

}catch(error){

alert(error.message);

}

}

window.login = async function(){

try{

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

await signInWithEmailAndPassword(
auth,
email,
password
);

localStorage.setItem(
"wowUser",
email
);

window.location.href = "dashboard.html";

}catch(error){

alert(error.message);

}

}

</script>

</body>
</html>
