<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Web of Webs - Login</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0f172a;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .login-box{
      width:350px;
      background:#111827;
      padding:30px;
      border-radius:15px;
      text-align:center;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
    }

    h1{
      color:white;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:none;
      border-radius:8px;
      outline:none;
      font-size:16px;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:8px;
      background:#2563eb;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
      font-weight:bold;
    }

    button:hover{
      background:#1d4ed8;
    }

    .google-btn{
      background:white;
      color:black;
    }

    .google-btn:hover{
      background:#e5e7eb;
    }

    p{
      color:#9ca3af;
      margin-top:15px;
      font-size:14px;
    }

  </style>
</head>

<body>

  <div class="login-box">

    <h1>🔐 Web of Webs</h1>

    <input type="email" id="email" placeholder="Enter Email">

    <input type="password" id="password" placeholder="Enter Password">
