<!DOCTYPE html>
<html>
<head>
  <title>Login - Web of Webs</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding-top: 80px;
    }

    .box {
      background: #111827;
      padding: 30px;
      width: 320px;
      margin: auto;
      border-radius: 12px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 95%;
      padding: 10px;
      margin: 8px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #2563eb;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🔐 Web of Webs Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>

  <hr>

  <button onclick="googleLogin()">Continue with Google</button>
</div>

<script type="module">

  // ✅ Firebase SDK
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
  import { getAuth,
           createUserWithEmailAndPassword,
           signInWithEmailAndPassword,
           signInWithPopup,
           GoogleAuthProvider }
  from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

  // 🔥 YOUR FIREBASE CONFIG (FROM YOU)
  const firebaseConfig = {
    apiKey: "AIzaSyBBg5ULPiuynvTnFtVJSYIq2THUJU1-ODo",
    authDomain: "web-of-webs-5dcc6.firebaseapp.com",
    projectId: "web-of-webs-5dcc6",
    storageBucket: "web-of-webs-5dcc6.firebasestorage.app",
    messagingSenderId: "716021090393",
    appId: "1:716021090393:web:6ccf781be1d36d49408948",
    measurementId: "G-WNJK1QDBV8"
  };

  // Init Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // 📌 SIGN UP
  window.signup = function () {
    createUserWithEmailAndPassword(auth, email.value, password.value)
      .then(() => {
        alert("Account Created!");
        window.location.href = "index.html";
      })
      .catch(err => alert(err.message));
  };

  // 📌 LOGIN
  window.login = function () {
    signInWithEmailAndPassword(auth, email.value, password.value)
      .then(() => {
        alert("Login Successful!");
        window.location.href = "index.html";
      })
      .catch(err => alert(err.message));
  };

  // 📌 GOOGLE LOGIN
  window.googleLogin = function () {
    signInWithPopup(auth, provider)
      .then(() => {
        alert("Google Login Success!");
        window.location.href = "index.html";
      })
      .catch(err => alert(err.message));
  };

</script>

</body>
</html>
