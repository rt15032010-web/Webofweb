<!DOCTYPE html>
<html>
<head>
  <title>Templates - Web of Webs</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #ffffff;
      color: #111;
    }

    /* NAVBAR */
    nav {
      background: white;
      padding: 15px;
      display: flex;
      justify-content: center;
      gap: 20px;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
    }

    nav a {
      text-decoration: none;
      color: #111;
      font-weight: bold;
    }

    /* HEADER */
    .header {
      text-align: center;
      padding: 40px 20px 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    /* SEARCH BOX */
    input {
      width: 60%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    /* CATEGORY BUTTONS */
    .categories {
      text-align: center;
      margin: 20px;
    }

    .cat-btn {
      padding: 10px 15px;
      margin: 5px;
      border: 1px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      background: white;
      font-weight: bold;
    }

    .cat-btn:hover {
      background: #f3f4f6;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      border: 1px solid #eee;
      border-radius: 12px;
      overflow: hidden;
      background: white;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .card p {
      text-align: center;
      padding: 10px;
      margin: 0;
      font-weight: bold;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <a href="index.html">Home</a>
  <a href="builder.html">Builder</a>
  <a href="portfolio.html">Portfolio</a>
  <a href="templates.html">Templates</a>
  <a href="pricing.html">Pricing</a>
  <a href="ai.html">AI</a>
</nav>

<!-- HEADER -->
<div class="header">
  <h1>🎨 Templates Library</h1>
  <p>Search and choose the perfect template for your website</p>

  <input type="text" placeholder="Search templates..." onkeyup="searchTemplates(this.value)">
</div>

<!-- CATEGORY BUTTONS -->
<div class="categories">
  <button class="cat-btn" onclick="showCategory('education')">Education</button>
  <button class="cat-btn" onclick="showCategory('business')">Business</button>
  <button class="cat-btn" onclick="showCategory('portfolio')">Portfolio</button>
  <button class="cat-btn" onclick="showCategory('public')">Public</button>
  <button class="cat-btn" onclick="showCategory('all')">All</button>
</div>

<!-- TEMPLATE GRID -->
<div class="grid" id="grid"></div>

<script>

let currentCategory = "all";

/* GENERATE TEMPLATES */
function loadTemplates(category) {
  let grid = document.getElementById("grid");
  grid.innerHTML = "";

  for (let i = 1; i <= 100; i++) {

    let type = "";

    if (i % 4 === 0) type = "education";
    else if (i % 4 === 1) type = "business";
    else if (i % 4 === 2) type = "portfolio";
    else type = "public";

    if (category !== "all" && category !== type) continue;

    grid.innerHTML += `
      <div class="card">
        <img src="https://picsum.photos/400/300?random=${i}">
        <p>${type.toUpperCase()} Template ${i}</p>
      </div>
    `;
  }
}

/* CATEGORY FILTER */
function showCategory(cat) {
  currentCategory = cat;
  loadTemplates(cat);
}

/* SEARCH FUNCTION */
function searchTemplates(value) {
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    if (card.innerText.toLowerCase().includes(value.toLowerCase())) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
}

/* INITIAL LOAD */
loadTemplates("all");

</script>

</body>
  </html>
