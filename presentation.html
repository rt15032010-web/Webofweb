<!DOCTYPE html>
<html>
<head>
  <title>Presentation - Web of Webs</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    nav {
      background: white;
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    .container {
      display: flex;
      height: 90vh;
    }

    .left {
      width: 30%;
      background: white;
      padding: 10px;
    }

    textarea {
      width: 100%;
      height: 300px;
      padding: 10px;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }

    .right {
      width: 70%;
      padding: 20px;
    }

    .slide {
      background: white;
      height: 80%;
      border-radius: 10px;
      padding: 20px;
    }
  </style>
</head>

<body>

<nav>
  <a href="portfolio.html">⬅ Back</a>
</nav>

<div class="container">

  <div class="left">
    <h3>📊 Slide Editor</h3>

    <textarea id="text">Welcome to Presentation</textarea>

    <button onclick="addSlide()">➕ Add Slide</button>
    <button onclick="showSlide()">👁 Preview</button>
    <button onclick="downloadSlides()">💾 Download</button>
  </div>

  <div class="right">
    <div class="slide" id="slideBox">Slide Preview</div>
  </div>

</div>

<script>

let slides = [];

function addSlide(){
  slides.push(document.getElementById("text").value);
  alert("Slide added!");
}

function showSlide(){
  document.getElementById("slideBox").innerText =
    document.getElementById("text").value;
}

function downloadSlides(){
  let content = slides.join("\n\n---\n\n");

  let blob = new Blob([content], {type:"text/plain"});
  let link = document.createElement("a");

  link.href = URL.createObjectURL(blob);
  link.download = "presentation.txt";
  link.click();
}

</script>

</body>
</html>
