<!DOCTYPE html>
<html>
<head>
  <title>Advanced Portfolio Builder - Web of Webs</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    /* NAV */
    nav {
      background: #111827;
      padding: 15px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      padding: 8px 12px;
      border-radius: 6px;
    }

    nav a:hover {
      background: #2563eb;
    }

    /* LAYOUT */
    .container {
      display: flex;
      height: 90vh;
    }

    .left {
      width: 45%;
      background: #111827;
      padding: 20px;
      overflow-y: auto;
    }

    .right {
      width: 55%;
      background: white;
      color: black;
      padding: 20px;
      overflow-y: auto;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .card {
      background: #f3f4f6;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
    }

    img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<!-- NAVIGATION -->
<nav>
  <a href="index.html">Home</a>
  <a href="portfolio.html">Portfolio</a>
  <a href="portfolio-builder.html">Builder</a>
</nav>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">

    <h2>🖼 Profile Image</h2>
    <input type="file" id="imageInput" accept="image/*">

    <h2>👤 Personal Info</h2>

    <input id="name" placeholder="Full Name">
    <input id="dob" placeholder="Date of Birth">
    <input id="age" placeholder="Age">
    <input id="country" placeholder="Country">
    <input id="state" placeholder="State">
    <input id="city" placeholder="City / Village">
    <input id="phone" placeholder="Phone Number">

    <h2>🎓 School Info (1–12)</h2>

    <input id="schoolCount" type="number" min="1" max="12" placeholder="How many schools?" onchange="generateSchools()">

    <div id="schoolsBox"></div>

    <h2>🏫 College</h2>

    <select id="collegeYes" onchange="toggleCollege()">
      <option value="no">No College</option>
      <option value="yes">Yes College</option>
    </select>

    <div id="collegeBox"></div>

    <h2>💡 Skills</h2>
    <input id="skills" placeholder="HTML, CSS, JS">

    <h2>📁 Project</h2>
    <input id="projectName" placeholder="Project Name">
    <input id="projectDesc" placeholder="Project Description">

    <button onclick="generate()">✨ Generate Portfolio</button>

  </div>

  <!-- RIGHT SIDE -->
  <div class="right" id="preview">
    <h2>Live Preview</h2>
    <p>Fill form and click Generate</p>
  </div>

</div>

<script>

let profileImage = "";

/* IMAGE UPLOAD */
document.getElementById("imageInput").onchange = function(event) {
  let reader = new FileReader();

  reader.onload = function() {
    profileImage = reader.result;
  };

  reader.readAsDataURL(event.target.files[0]);
};

/* SCHOOL BOXES */
function generateSchools() {
  let count = document.getElementById("schoolCount").value;
  let box = document.getElementById("schoolsBox");
  box.innerHTML = "";

  for (let i = 1; i <= count; i++) {
    box.innerHTML += `
      <input placeholder="School ${i} Name" id="school${i}">
      <input placeholder="School ${i} Location" id="schoolloc${i}">
    `;
  }
}

/* COLLEGE */
function toggleCollege() {
  let val = document.getElementById("collegeYes").value;
  let box = document.getElementById("collegeBox");

  if (val === "yes") {
    box.innerHTML = `
      <input id="collegeName" placeholder="College Name">
      <input id="collegePlace" placeholder="College Location">
      <input id="course" placeholder="Course">
    `;
  } else {
    box.innerHTML = "";
  }
}

/* GENERATE PORTFOLIO */
function generate() {

  let html = "";

  // PROFILE
  html += `
    <div class="card" style="text-align:center">
      ${profileImage ? `<img src="${profileImage}">` : ""}
      <div class="title">${document.getElementById("name").value}</div>
      <p>${document.getElementById("age").value} years old</p>
    </div>
  `;

  // INFO
  html += `
    <div class="card">
      <b>DOB:</b> ${document.getElementById("dob").value}<br>
      <b>Location:</b> ${document.getElementById("city").value}, ${document.getElementById("state").value}, ${document.getElementById("country").value}<br>
      <b>Phone:</b> ${document.getElementById("phone").value}
    </div>
  `;

  // SCHOOLS
  let count = document.getElementById("schoolCount").value;
  let schoolHTML = "";

  for (let i = 1; i <= count; i++) {
    schoolHTML += `
      <p>🏫 ${document.getElementById("school"+i).value} - ${document.getElementById("schoolloc"+i).value}</p>
    `;
  }

  html += `<div class="card"><h3>Schools</h3>${schoolHTML}</div>`;

  // COLLEGE
  if (document.getElementById("collegeYes").value === "yes") {
    html += `
      <div class="card">
        <h3>College</h3>
        ${document.getElementById("collegeName").value}<br>
        ${document.getElementById("collegePlace").value}<br>
        ${document.getElementById("course").value}
      </div>
    `;
  }

  // SKILLS
  html += `<div class="card"><h3>Skills</h3>${document.getElementById("skills").value}</div>`;

  // PROJECT
  html += `
    <div class="card">
      <h3>Project</h3>
      <b>${document.getElementById("projectName").value}</b><br>
      ${document.getElementById("projectDesc").value}
    </div>
  `;

  document.getElementById("preview").innerHTML = html;
}

</script>

</body>
</html>
