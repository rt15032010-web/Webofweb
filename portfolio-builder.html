<!DOCTYPE html>
<html>
<head>
  <title>Web of Webs - Portfolio Builder</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .top {
      background: #111827;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      display: flex;
      height: 90vh;
    }

    .left {
      width: 40%;
      background: #111827;
      padding: 20px;
      overflow-y: auto;
    }

    input, textarea {
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      border: none;
      border-radius: 8px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #3b82f6;
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .right {
      width: 60%;
      background: white;
      color: black;
      padding: 30px;
      overflow-y: auto;
    }

    .card {
      background: #f3f4f6;
      padding: 20px;
      border-radius: 12px;
      margin-top: 10px;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
    }

    .small {
      color: gray;
    }
  </style>
</head>

<body>

<div class="top">🚀 Web of Webs - Portfolio Builder</div>

<div class="container">

  <!-- LEFT PANEL -->
  <div class="left">

    <h3>👤 Personal Info</h3>

    <input id="name" placeholder="Your Name">
    <input id="title" placeholder="Your Title">
    <textarea id="bio" placeholder="About You"></textarea>

    <h3>💡 Skills</h3>
    <input id="skills" placeholder="HTML, CSS, JavaScript">

    <h3>📁 Project</h3>
    <input id="projectName" placeholder="Project Name">
    <input id="projectDesc" placeholder="Project Description">

    <button onclick="generate()">✨ Generate Portfolio</button>
    <button onclick="downloadPortfolio()">💾 Download Portfolio</button>

  </div>

  <!-- RIGHT PREVIEW -->
  <div class="right" id="preview">

    <h2>Live Preview</h2>
    <p class="small">Fill the form and click Generate</p>

  </div>

</div>

<script>

let portfolioHTML = "";

function generate(){

  let name = document.getElementById("name").value;
  let title = document.getElementById("title").value;
  let bio = document.getElementById("bio").value;
  let skills = document.getElementById("skills").value;
  let projectName = document.getElementById("projectName").value;
  let projectDesc = document.getElementById("projectDesc").value;

  portfolioHTML = `
    <div style="font-family:Arial">

      <div style="background:#fff;padding:20px;border-radius:12px;margin-bottom:10px">
        <h1>${name}</h1>
        <h3>${title}</h3>
      </div>

      <div style="background:#fff;padding:20px;border-radius:12px;margin-bottom:10px">
        <h2>About Me</h2>
        <p>${bio}</p>
      </div>

      <div style="background:#fff;padding:20px;border-radius:12px;margin-bottom:10px">
        <h2>Skills</h2>
        <p>${skills}</p>
      </div>

      <div style="background:#fff;padding:20px;border-radius:12px;margin-bottom:10px">
        <h2>Project</h2>
        <h3>${projectName}</h3>
        <p>${projectDesc}</p>
      </div>

    </div>
  `;

  document.getElementById("preview").innerHTML = portfolioHTML;
}

function downloadPortfolio(){

  if(portfolioHTML === ""){
    alert("Please generate portfolio first!");
    return;
  }

  let blob = new Blob([portfolioHTML], {type: "text/html"});
  let link = document.createElement("a");

  link.href = URL.createObjectURL(blob);
  link.download = "portfolio.html";
  link.click();
}

</script>

</body>
</html>
