<!DOCTYPE html>
<html>
<head>
  <title>Web of Webs - Builder</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      height: 100vh;
    }

    /* LEFT PANEL */
    .left {
      width: 40%;
      background: #111;
      color: white;
      display: flex;
      flex-direction: column;
    }

    .top {
      padding: 10px;
      background: #1f1f1f;
    }

    select, input, button {
      width: 95%;
      margin: 5px;
      padding: 8px;
    }

    textarea {
      width: 100%;
      height: 60vh;
      background: #000;
      color: #0f0;
      border: none;
      padding: 10px;
      font-family: monospace;
    }

    /* RIGHT PANEL */
    .right {
      width: 60%;
      background: white;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

<!-- LEFT SIDE -->
<div class="left">

  <div class="top">
    <h3>📁 Web of Webs Builder</h3>

    <input id="projectName" placeholder="Enter Project Name">

    <select id="fileSelect" onchange="switchFile()">
      <option value="html">index.html</option>
      <option value="css">style.css</option>
      <option value="js">script.js</option>
    </select>

    <button onclick="runCode()">▶ Run</button>
  </div>

  <textarea id="editor"></textarea>

</div>

<!-- RIGHT SIDE -->
<div class="right">
  <iframe id="preview"></iframe>
</div>

<script>

let files = {
  html: "<h1>Hello Web of Webs</h1>",
  css: "body { font-family: Arial; background: #f0f0f0; }",
  js: "console.log('Hello');"
};

let current = "html";

/* LOAD FILE */
function switchFile(){
  saveFile();
  current = document.getElementById("fileSelect").value;
  document.getElementById("editor").value = files[current];
}

/* SAVE FILE */
function saveFile(){
  files[current] = document.getElementById("editor").value;
}

/* RUN CODE */
function runCode(){
  saveFile();

  let html = files.html;
  let css = "<style>" + files.css + "</style>";
  let js = "<script>" + files.js + "<\/script>";

  let output = html + css + js;

  document.getElementById("preview").srcdoc = output;
}

/* INIT */
document.getElementById("editor").value = files.html;

</script>

</body>
</html>
