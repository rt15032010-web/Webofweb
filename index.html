<!DOCTYPE html>
<html>
<head>
  <title>Web of Webs</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: white;
      color: #111;
    }

    /* NAVBAR */
    nav {
      background: #ffffff;
      padding: 15px;
      display: flex;
      justify-content: center;
      gap: 20px;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
    }

    nav a {
      color: #111;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: #2563eb;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 70px 20px;
      background: #f3f4f6;
    }

    .hero h1 {
      font-size: 45px;
      color: #111;
    }

    .btn {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      margin: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .blue { background: #2563eb; color: white; }
    .black { background: #111; color: white; }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      border: 1px solid #eee;
      border-radius: 12px;
      overflow: hidden;
      transition: 0.3s;
      background: white;
    }

    .card:hover {
      transform: scale(1.03);
    }

    img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    h2 {
      text-align: center;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="builder.html">Builder</a>
  <a href="portfolio.html">Portfolio</a>
  <a href="templates.html">Templates</a>
  <a href="pricing.html">Pricing</a>
  <a href="ai.html">AI Assistant</a>
</nav>

<div class="hero">
  <h1>🌐 Web of Webs</h1>
  <p>Build Websites • Portfolios • Templates • AI Tools</p>

  <button class="btn blue">Create Website</button>
  <button class="btn black">View Templates</button>
</div>

<h2>🔥 Website Design Gallery</h2>

<div class="grid">
  <script>
    for (let i = 1; i <= 30; i++) {
      document.write(`
        <div class="card">
          <img src="https://picsum.photos/400/300?random=${i}">
        </div>
      `);
    }
  </script>
</div>

</body>
</html>
