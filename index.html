<!DOCTYPE html>
<html>
<head>
  <title>WebCraft Studio</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .hero {
      text-align: center;
      padding: 80px 20px;
      background: linear-gradient(135deg, #1e3a8a, #0b0f1a);
    }

    .hero h1 {
      font-size: 45px;
    }

    .btn {
      padding: 10px 20px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .blue { background: #2563eb; color: white; }
    .green { background: #16a34a; color: white; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    img {
      width: 100%;
      border-radius: 12px;
    }

    nav {
      background: #111827;
      padding: 15px;
      display: flex;
      justify-content: center;
      gap: 20px;
      position: sticky;
      top: 0;
    }

    nav a {
      color: white;
      text-decoration: none;
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="builder.html">Builder</a>
  <a href="portfolio.html">Portfolio</a>
  <a href="templates.html">Templates</a>
  <a href="pricing.html">Pricing</a>
  <a href="ai.html">AI</a>
</nav>

<div class="hero">
  <h1>🚀 WebCraft Studio</h1>
  <p>Build Websites • Portfolios • Templates • AI Help</p>

  <button class="btn blue">Create Website</button>
  <button class="btn green">View Templates</button>
</div>

<section>
  <h2 style="text-align:center;">🔥 AI Design Gallery</h2>

  <div class="grid">
    <script>
      for (let i = 1; i <= 30; i++) {
        document.write(`
          <div class="card">
            <img src="https://source.unsplash.com/400x300/?website,ui,design&sig=${i}">
          </div>
        `);
      }
    </script>
  </div>
</section>

</body>
</html>
