<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Portfolio Builder</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
font-family:Inter,sans-serif;
background:#020617;
color:white;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#0f172a;
}

.topbar a{
color:white;
text-decoration:none;
}

.container{
display:flex;
gap:30px;
padding:30px;
}

.form-section{
width:35%;
background:rgba(255,255,255,0.06);
padding:25px;
border-radius:24px;
backdrop-filter:blur(20px);
height:90vh;
overflow:auto;
}

.form-section h2{
margin-bottom:20px;
}

.form-section input,
.form-section textarea{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
}

.form-section textarea{
height:100px;
resize:none;
}

.form-section button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#2563eb,#7c3aed);
color:white;
font-size:16px;
cursor:pointer;
}

.preview-section{
flex:1;
display:flex;
justify-content:center;
align-items:flex-start;
}

.portfolio-card{
width:100%;
max-width:800px;
background:linear-gradient(135deg,#111827,#1e293b);
border-radius:30px;
padding:40px;
box-shadow:0 0 40px rgba(0,0,0,0.4);
}

.profile{
text-align:center;
}

.profile img{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
border:5px solid #2563eb;
}

.profile h1{
margin-top:20px;
font-size:42px;
}

.profile p{
opacity:0.8;
line-height:1.7;
}

.section{
margin-top:35px;
}

.section h2{
margin-bottom:15px;
color:#60a5fa;
}

.skill-tags{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.skill-tags span{
background:#2563eb;
padding:10px 16px;
border-radius:30px;
}

.download-btn{
margin-top:30px;
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#2563eb,#7c3aed);
color:white;
cursor:pointer;
}

@media(max-width:900px){

.container{
flex-direction:column;
}

.form-section{
width:100%;
height:auto;
}

}

</style>

</head>

<body>

<div class="topbar">

<h1>🎨 Portfolio Builder</h1>

<a href="dashboard.html">
← Dashboard
</a>

</div>

<div class="container">

<div class="form-section">

<h2>Create Your Portfolio</h2>

<input
type="file"
id="imageUpload"
>

<input
type="text"
id="name"
placeholder="Full Name"
>

<input
type="text"
id="role"
placeholder="Your Role"
>

<textarea
id="about"
placeholder="About Yourself"
></textarea>

<input
type="text"
id="skills"
placeholder="Skills (comma separated)"
>

<input
type="email"
id="email"
placeholder="Email"
>

<input
type="text"
id="phone"
placeholder="Phone Number"
>

<input
type="text"
id="github"
placeholder="GitHub Link"
>

<input
type="text"
id="linkedin"
placeholder="LinkedIn Link"
>

<button onclick="updatePortfolio()">
Generate Portfolio
</button>

<button onclick="downloadPortfolio()">
Download Portfolio
</button>

</div>

<div class="preview-section">

<div class="portfolio-card"
id="portfolioCard">

<div class="profile">

<img
id="profileImage"
src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200"
>

<h1 id="previewName">
Your Name
</h1>

<h3 id="previewRole">
Your Role
</h3>

<p id="previewAbout">
Your portfolio preview will appear here.
</p>

</div>

<div class="section">

<h2>Skills</h2>

<div class="skill-tags"
id="skillTags">

<span>HTML</span>
<span>CSS</span>
<span>JavaScript</span>

</div>

</div>

<div class="section">

<h2>Contact</h2>

<p id="previewEmail">
Email: example@gmail.com
</p>

<p id="previewPhone">
Phone: +91 XXXXX XXXXX
</p>

<p id="previewGithub">
GitHub: github.com
</p>

<p id="previewLinkedin">
LinkedIn: linkedin.com
</p>

</div>

</div>

</div>

</div>

<script>

const imageUpload =
document.getElementById("imageUpload");

imageUpload.addEventListener("change",(e)=>{

const file = e.target.files[0];

if(file){

document.getElementById(
"profileImage"
).src = URL.createObjectURL(file);

}

});

function updatePortfolio(){

document.getElementById(
"previewName"
).innerText =
document.getElementById("name").value;

document.getElementById(
"previewRole"
).innerText =
document.getElementById("role").value;

document.getElementById(
"previewAbout"
).innerText =
document.getElementById("about").value;

document.getElementById(
"previewEmail"
).innerText =
"Email: " +
document.getElementById("email").value;

document.getElementById(
"previewPhone"
).innerText =
"Phone: " +
document.getElementById("phone").value;

document.getElementById(
"previewGithub"
).innerText =
"GitHub: " +
document.getElementById("github").value;

document.getElementById(
"previewLinkedin"
).innerText =
"LinkedIn: " +
document.getElementById("linkedin").value;

const skills =
document.getElementById("skills")
.value.split(",");

let skillsHTML = "";

skills.forEach(skill=>{

skillsHTML +=
`<span>${skill}</span>`;

});

document.getElementById(
"skillTags"
).innerHTML = skillsHTML;

}

function downloadPortfolio(){

window.print();

}

</script>

</body>

</html>
