<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Portfolio Builder</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#0f172a;
position:sticky;
top:0;
z-index:100;
}

.topbar a{
color:white;
text-decoration:none;
}

.container{
display:flex;
gap:30px;
padding:30px;
}

.form-panel{
width:35%;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(20px);
padding:25px;
border-radius:25px;
height:90vh;
overflow:auto;
}

.form-panel h2{
margin-bottom:20px;
}

.form-panel input,
.form-panel textarea,
.form-panel select{
width:100%;
padding:15px;
margin-top:14px;
border:none;
border-radius:14px;
background:#1e293b;
color:white;
font-size:15px;
}

.form-panel textarea{
height:100px;
resize:none;
}

.form-panel button{
width:100%;
padding:15px;
margin-top:16px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#2563eb,#7c3aed);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.form-panel button:hover{
transform:scale(1.03);
}

.preview-panel{
flex:1;
display:flex;
justify-content:center;
align-items:flex-start;
}

.portfolio{
width:100%;
max-width:850px;
background:linear-gradient(135deg,#111827,#1e293b);
border-radius:35px;
padding:40px;
box-shadow:0 0 50px rgba(0,0,0,0.5);
}

.hero{
text-align:center;
}

.hero img{
width:170px;
height:170px;
border-radius:50%;
object-fit:cover;
border:6px solid #3b82f6;
}

.hero h1{
font-size:48px;
margin-top:20px;
}

.hero h3{
margin-top:10px;
color:#60a5fa;
}

.hero p{
margin-top:20px;
line-height:1.8;
opacity:0.85;
}

.section{
margin-top:40px;
}

.section h2{
margin-bottom:18px;
color:#60a5fa;
}

.skills{
display:flex;
flex-wrap:wrap;
gap:12px;
}

.skills span{
padding:10px 18px;
background:#2563eb;
border-radius:30px;
}

.edu-card{
background:rgba(255,255,255,0.06);
padding:18px;
border-radius:18px;
margin-top:15px;
}

.ai-box{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:20px;
margin-top:25px;
}

.ai-box h3{
margin-bottom:12px;
}

.download-btn{
margin-top:35px;
padding:18px;
width:100%;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#2563eb,#7c3aed);
font-size:18px;
color:white;
cursor:pointer;
}

@media(max-width:900px){

.container{
flex-direction:column;
}

.form-panel{
width:100%;
height:auto;
}

}

</style>

</head>

<body>

<div class="topbar">

<h1>🚀 AI Portfolio Builder</h1>

<a href="dashboard.html">
← Dashboard
</a>

</div>

<div class="container">

<div class="form-panel">

<h2>Create Your Portfolio</h2>

<input type="file" id="photo">

<input type="text" id="name" placeholder="Full Name">

<input type="date" id="dob">

<input type="text" id="country" placeholder="Country">

<input type="text" id="state" placeholder="State">

<input type="text" id="city" placeholder="City / Village">

<input type="text" id="role" placeholder="Your Profession">

<textarea id="about" placeholder="Write About Yourself"></textarea>

<input type="text" id="skills" placeholder="Skills (comma separated)">

<input type="text" id="school" placeholder="School Name">

<input type="text" id="college" placeholder="College Name">

<input type="email" id="email" placeholder="Email">

<input type="text" id="phone" placeholder="Phone Number">

<div class="ai-box">

<h3>🤖 AI Assistant</h3>

<textarea
id="aiQuestion"
placeholder="Tell AI about yourself..."
></textarea>

<button onclick="generateAbout()">
Generate About Me
</button>

</div>

<button onclick="generatePortfolio()">
Generate Portfolio
</button>

<button onclick="downloadPDF()">
Download PDF
</button>

</div>

<div class="preview-panel">

<div class="portfolio" id="portfolio">

<div class="hero">

<img
id="previewPhoto"
src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200"
>

<h1 id="previewName">
Your Name
</h1>

<h3 id="previewRole">
Your Profession
</h3>

<p id="previewAbout">
Your About Me section will appear here.
</p>

</div>

<div class="section">

<h2>🌍 Personal Info</h2>

<p id="previewLocation">
Country • State • City
</p>

<p id="previewDOB">
DOB: --
</p>

</div>

<div class="section">

<h2>🧠 Skills</h2>

<div class="skills" id="previewSkills">

<span>HTML</span>
<span>CSS</span>
<span>JavaScript</span>

</div>

</div>

<div class="section">

<h2>🎓 Education</h2>

<div class="edu-card">
<p id="previewSchool">
School: --
</p>
</div>

<div class="edu-card">
<p id="previewCollege">
College: --
</p>
</div>

</div>

<div class="section">

<h2>📞 Contact</h2>

<p id="previewEmail">
Email: --
</p>

<p id="previewPhone">
Phone: --
</p>

</div>

</div>

</div>

</div>

<script>

document.getElementById("photo")
.addEventListener("change",(e)=>{

const file=e.target.files[0];

if(file){

document.getElementById("previewPhoto")
.src=URL.createObjectURL(file);

}

});

function generateAbout(){

const text =
document.getElementById("aiQuestion").value;

const about =
`Passionate and creative individual with strong interest in ${text}. Dedicated to learning modern skills, building projects and growing professionally in the digital world.`;

document.getElementById("about").value=about;

}

function generatePortfolio(){

document.getElementById("previewName")
.innerText =
document.getElementById("name").value;

document.getElementById("previewRole")
.innerText =
document.getElementById("role").value;

document.getElementById("previewAbout")
.innerText =
document.getElementById("about").value;

document.getElementById("previewLocation")
.innerText =
`${document.getElementById("country").value}
 •
${document.getElementById("state").value}
 •
${document.getElementById("city").value}`;

document.getElementById("previewDOB")
.innerText =
"Date of Birth: " +
document.getElementById("dob").value;

document.getElementById("previewSchool")
.innerText =
"School: " +
document.getElementById("school").value;

document.getElementById("previewCollege")
.innerText =
"College: " +
document.getElementById("college").value;

document.getElementById("previewEmail")
.innerText =
"Email: " +
document.getElementById("email").value;

document.getElementById("previewPhone")
.innerText =
"Phone: " +
document.getElementById("phone").value;

const skills =
document.getElementById("skills")
.value.split(",");

let output="";

skills.forEach(skill=>{

output += `<span>${skill}</span>`;

});

document.getElementById("previewSkills")
.innerHTML = output;

}

function downloadPDF(){

const element =
document.getElementById("portfolio");

html2pdf()
.from(element)
.save("portfolio.pdf");

}

</script>

</body>
</html>
