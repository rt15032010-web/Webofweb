<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Website Builder</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
height:100vh;
overflow:hidden;
color:white;
}

.container{
display:flex;
height:100vh;
}

/* LEFT PANEL */

.left{
width:40%;
background:#111827;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
border-right:1px solid rgba(255,255,255,0.1);
}

.logo{
font-size:28px;
font-weight:bold;
color:#60a5fa;
margin-bottom:10px;
}

input,
select,
textarea{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:12px;
background:#1f2937;
color:white;
font-size:15px;
}

textarea{
flex:1;
resize:none;
font-family:monospace;
font-size:15px;
}

button{
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#2563eb,#3b82f6);
color:white;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:0.9;
}

/* RIGHT OUTPUT */

.right{
flex:1;
background:white;
position:relative;
}

.preview-header{
height:60px;
background:#f1f5f9;
display:flex;
align-items:center;
padding:0 20px;
border-bottom:1px solid #ddd;
color:black;
font-weight:bold;
}

iframe{
width:100%;
height:calc(100% - 60px);
border:none;
background:white;
}

/* MOBILE */

@media(max-width:900px){

.container{
flex-direction:column;
}

.left{
width:100%;
height:50%;
}

.right{
height:50%;
}

}

</style>

</head>

<body>

<div class="container">

<!-- LEFT SIDE -->

<div class="left">

<div class="logo">
Web of Webs
</div>

<input
type="text"
id="websiteName"
placeholder="Website Name"
>

<input
type="text"
id="websiteDesc"
placeholder="Website Description"
>

<select id="language">

<option value="html">
HTML
</option>

<option value="css">
CSS
</option>

<option value="javascript">
JavaScript
</option>

</select>

<textarea
id="codeEditor"
placeholder="Write your code here..."
>
<h1>Hello World</h1>

<p>Welcome to Web of Webs</p>

<button>Get Started</button>
</textarea>

<button onclick="runCode()">
Run Code
</button>

</div>

<!-- RIGHT SIDE -->

<div class="right">

<div class="preview-header">
Live Website Output
</div>

<iframe id="preview"></iframe>

</div>

</div>

<script>

function runCode(){

const code =
document.getElementById("codeEditor").value;

const iframe =
document.getElementById("preview");

iframe.srcdoc = code;

}

/* AUTO RUN */

document.getElementById("codeEditor")
.addEventListener("input",runCode);

runCode();

</script>

</body>
</html>
